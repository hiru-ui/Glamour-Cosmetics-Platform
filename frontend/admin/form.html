<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form | Glamour Cosmetics</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>

<body>
    <header></header>

    <div class="container" style="padding-top: var(--spacing-lg); padding-bottom: var(--spacing-xl); min-height: 60vh;">
        <h1 id="form-title" class="section-title">Add New Product</h1>

        <div class="form-container">
            <form id="product-form">
                <input type="hidden" id="product-id">

                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" required placeholder="e.g. Velvet Matte Lipstick">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select a Category</option>
                        <option value="Lips">Lips</option>
                        <option value="Face">Face</option>
                        <option value="Eyes">Eyes</option>
                        <option value="Skincare">Skincare</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" required min="0" step="0.01" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="imageUrl">Image URL</label>
                    <input type="url" id="imageUrl" required placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4" required placeholder="Product description..."></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" id="save-btn" class="btn" style="flex: 1;">Create Product</button>
                    <a href="dashboard.html" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer></footer>

    <script src="../js/app.js"></script>
    <script src="../js/shop.js"></script>
    <script src="../js/admin.js"></script>
</body>

</html>
